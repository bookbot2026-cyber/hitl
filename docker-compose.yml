version: '3.8'

services:
  kafka:
    image: confluentinc/confluent-local:latest
    container_name: local-kafka
    ports:
      - "9092:9092"
    environment:
      # Optional: custom configurations can go here
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

