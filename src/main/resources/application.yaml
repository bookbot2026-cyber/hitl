spring:
  application:
    name: hitl
  
  datasource:
    # Supabase provides this pooler JDBC URL in settings (if port 5432 fails, try 6543 which is transaction pooler)
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:postgres.qwqpnekwdpjlirxcpecx}
    password: ${SPRING_DATASOURCE_PASSWORD:botadmin2026}
    driver-class-name: org.postgresql.Driver
  
  flyway:
    enabled: true
    baseline-on-migrate: true

#  kafka:
#    bootstrap-servers: 172.29.185.1:9092
#    producer:
#      properties:
#        max.block.ms: 3000 # Fail fast in 3 seconds if broker is unreachable

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate # Validates the schema against JPA entities (ensures tables match reviews/review_dialogues)
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Required if using PostgreSQL JSONB with Hypersistence Utils
        jdbc:
          lob:
            non_contextual_creation: true
